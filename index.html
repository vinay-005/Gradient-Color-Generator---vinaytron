<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gradient Generator | Vinay Tiwari</title>

    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>VINAY</h2>
        <span>TIWARI</span>
    </div>

    <!-- Main Card -->
    <div class="login_form">

        <h3>Gradient Generator 🎨</h3>

        <!-- Gradient Preview -->
        <div class="gradient-box"></div>

        <!-- Options -->
        <div class="row options">

            <!-- Direction -->
            <div class="column direction">
                <p>Direction</p>

                <div class="select-box">
                    <select class="direction-select">
                        <option value="to top">Top</option>
                        <option value="to right top">Right Top</option>
                        <option value="to right">Right</option>
                        <option value="to right bottom">Right Bottom</option>
                        <option value="to bottom">Bottom</option>
                        <option value="to left bottom">Left Bottom</option>
                        <option value="to left">Left</option>
                        <option value="to left top" selected>Left Top</option>
                    </select>
                </div>
            </div>

            <!-- Colors -->
            <div class="column palette">
                <p>Colors</p>

                <div class="colors">
                    <input type="color" class="color1" value="#5665E9">
                    <input type="color" class="color2" value="#A271F8">
                </div>
            </div>

        </div>

        <!-- CSS Code -->
        <textarea class="gradient-code" disabled>
background-image: linear-gradient(to left top, #5665E9, #A271F8);
        </textarea>

        <!-- Buttons -->
        <div class="generator-buttons">
            <button class="refresh-btn">Refresh Colors</button>
            <button class="copy-btn">Copy Code</button>
        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
